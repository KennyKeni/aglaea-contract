name: Publish

on:
  workflow_dispatch:
    inputs:
      version:
        description: Version already set in package.json
        required: true
        type: string

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Install dependencies
        run: npm ci

      - name: Verify requested version
        env:
          PACKAGE_VERSION: ${{ inputs.version }}
        run: |
          node -e "const pkg = require('./package.json'); if (pkg.version !== process.env.PACKAGE_VERSION) { console.error(`Expected ${process.env.PACKAGE_VERSION}, found ${pkg.version}`); process.exit(1); }"

      - name: Test
        run: npm test

      - name: Verify package contents
        run: npm run pack:dry-run

      - name: Publish package
        run: npm publish --access public
